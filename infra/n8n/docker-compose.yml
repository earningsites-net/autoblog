services:
  postgres:
    image: postgres:16-alpine
    container_name: autoblog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  n8n:
    image: n8nio/n8n:latest
    container_name: autoblog-n8n
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${N8N_PORT:-5678}:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL}
      WEBHOOK_URL: ${WEBHOOK_URL}
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE}
      EXECUTIONS_MODE: regular
      EXECUTIONS_DATA_PRUNE: true
      EXECUTIONS_DATA_MAX_AGE: 168
      N8N_METRICS: true
      N8N_LOG_LEVEL: info
      # Needed by Code nodes in these workflow templates (uses $env.*)
      N8N_BLOCK_ENV_ACCESS_IN_NODE: ${N8N_BLOCK_ENV_ACCESS_IN_NODE:-false}
      # Needed by the image workflow Code node (node-fetch fallback when global fetch is unavailable)
      NODE_FUNCTION_ALLOW_EXTERNAL: ${NODE_FUNCTION_ALLOW_EXTERNAL:-node-fetch}
      NODE_FUNCTION_ALLOW_BUILTIN: ${NODE_FUNCTION_ALLOW_BUILTIN:-buffer}
      # Custom vars exposed to workflows
      WEB_APP_URL: ${WEB_APP_URL}
      WEB_REVALIDATE_SECRET: ${WEB_REVALIDATE_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      REPLICATE_API_TOKEN: ${REPLICATE_API_TOKEN}
      TEXT_MODEL_DRAFT: ${TEXT_MODEL_DRAFT}
      TEXT_MODEL_QA: ${TEXT_MODEL_QA}
      IMAGE_MODEL: ${IMAGE_MODEL}
      MONTHLY_BUDGET_USD: ${MONTHLY_BUDGET_USD}
      PUBLISH_QUOTA_MIN: ${PUBLISH_QUOTA_MIN}
      PUBLISH_QUOTA_MAX: ${PUBLISH_QUOTA_MAX}
      TOPIC_DISCOVERY_TARGET_PER_DAY: ${TOPIC_DISCOVERY_TARGET_PER_DAY}
      PIPELINE_MODE_DEFAULT: ${PIPELINE_MODE_DEFAULT}
      PREPOPULATE_TARGET_PUBLISHED: ${PREPOPULATE_TARGET_PUBLISHED}
      PREPOPULATE_BATCH_SIZE: ${PREPOPULATE_BATCH_SIZE}
      PREPOPULATE_MAX_RUN_MINUTES: ${PREPOPULATE_MAX_RUN_MINUTES}
      PREPOPULATE_MAX_COST_USD: ${PREPOPULATE_MAX_COST_USD}
      ARTICLE_BATCH_SIZE: ${ARTICLE_BATCH_SIZE}
      IMAGE_BATCH_SIZE: ${IMAGE_BATCH_SIZE}
      QA_BATCH_SIZE: ${QA_BATCH_SIZE}
      SITE_SLUG: ${SITE_SLUG}
      PUBLISH_SCHEDULER_TICK_MINUTES: ${PUBLISH_SCHEDULER_TICK_MINUTES}
      PUBLISH_REVALIDATE_ENABLED: ${PUBLISH_REVALIDATE_ENABLED}
      PUBLISH_REVALIDATE_CONTINUE_ON_FAIL: ${PUBLISH_REVALIDATE_CONTINUE_ON_FAIL}
      PLAN_SCHEDULER_TICK_MINUTES: ${PLAN_SCHEDULER_TICK_MINUTES}
      PLAN_SCHEDULER_MAX_RUNS_PER_TICK: ${PLAN_SCHEDULER_MAX_RUNS_PER_TICK}
      PLAN_SCHEDULER_DAILY_CAP_BASE: ${PLAN_SCHEDULER_DAILY_CAP_BASE}
      PLAN_SCHEDULER_DAILY_CAP_STANDARD: ${PLAN_SCHEDULER_DAILY_CAP_STANDARD}
      PLAN_SCHEDULER_DAILY_CAP_PRO: ${PLAN_SCHEDULER_DAILY_CAP_PRO}
      PLAN_SCHEDULER_TEST_MODE: ${PLAN_SCHEDULER_TEST_MODE}
      PLAN_TEST_INTERVAL_MINUTES_BASE: ${PLAN_TEST_INTERVAL_MINUTES_BASE}
      PLAN_TEST_INTERVAL_MINUTES_STANDARD: ${PLAN_TEST_INTERVAL_MINUTES_STANDARD}
      PLAN_TEST_INTERVAL_MINUTES_PRO: ${PLAN_TEST_INTERVAL_MINUTES_PRO}
      PLAN_TOPIC_REFILL_INTERVAL_MINUTES: ${PLAN_TOPIC_REFILL_INTERVAL_MINUTES}
      PLAN_TOPIC_REFILL_COUNT: ${PLAN_TOPIC_REFILL_COUNT}
      CONTENT_ENGINE_URL: ${CONTENT_ENGINE_URL}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
      N8N_WORKFLOW_ID_ARTICLE_GENERATION: ${N8N_WORKFLOW_ID_ARTICLE_GENERATION}
      N8N_WORKFLOW_ID_IMAGE_GENERATION: ${N8N_WORKFLOW_ID_IMAGE_GENERATION}
      N8N_WORKFLOW_ID_QA_PUBLISH: ${N8N_WORKFLOW_ID_QA_PUBLISH}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
    volumes:
      - ./data:/home/node/.n8n
